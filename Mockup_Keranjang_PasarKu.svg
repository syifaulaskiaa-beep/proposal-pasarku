  <rect id="item2-bag-body" x="90" y="268" width="42" height="34" rx="6" fill="#9c27b0"/>
  <path id="item2-bag-handle" d="M97 268 q0-12 14-12 q14 0 14 12" fill="none" stroke="#7b1fa2" stroke-width="3.5" stroke-linecap="round"/>
