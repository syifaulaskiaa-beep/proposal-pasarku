  <rect id="item1-img-bg" x="76" y="155" width="70" height="70" rx="12" fill="#fff8e1"/>
  <circle id="item1-cookie" cx="111" cy="190" r="26" fill="#e6972a"/>
  <ellipse id="item1-chip1" cx="104" cy="185" rx="5" ry="4" fill="#4e2c0e"/>
  <ellipse id="item1-chip2" cx="116" cy="183" rx="4" ry="3" fill="#3e2008"/>
  <ellipse id="item1-chip3" cx="119" cy="195" rx="5" ry="4" fill="#4e2c0e"/>
  <ellipse id="item1-chip4" cx="107" cy="197" rx="4" ry="3" fill="#3e2008"/>
  <!-- product details -->
