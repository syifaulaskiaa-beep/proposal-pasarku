<svg viewBox="0 0 420 860" xmlns="http://www.w3.org/2000/svg" width="420" height="860" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a3fd4"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>

  <!-- ═══ PHONE FRAME ═══ -->
  <rect id="phone-shadow" x="32" y="14" width="360" height="800" rx="40" fill="#d0cef0"/>
