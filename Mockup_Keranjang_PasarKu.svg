  <rect id="item3-plus-bg" x="318" y="390" width="30" height="30" rx="8" fill="#4a3fd4"/>
  <text id="item3-plus" x="333" y="410" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">+</text>
  <text id="item3-subtotal" x="360" y="350" text-anchor="end" fill="#888899" font-size="11">Subtotal</text>
  <text id="item3-subtotal-val" x="360" y="364" text-anchor="end" fill="#1a1a4e" font-size="12" font-weight="700">Rp 105.000</text>

  <!-- ═══ PROMO CODE ═══ -->
  <line id="promo-divider" x1="30" y1="418" x2="390" y2="418" stroke="#f0f0f8" stroke-width="6"/>
