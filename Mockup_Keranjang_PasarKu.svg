  <rect id="promo-btn" x="278" y="434" width="100" height="32" rx="10" fill="url(#btnGrad)"/>
  <text id="promo-btn-text" x="328" y="454" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Gunakan</text>

