  <text id="item2-qty" x="299" y="320" text-anchor="middle" fill="#1a1a4e" font-size="14" font-weight="700">1</text>
  <rect id="item2-plus-bg" x="318" y="300" width="30" height="30" rx="8" fill="#4a3fd4"/>
  <text id="item2-plus" x="333" y="320" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">+</text>
  <text id="item2-subtotal" x="360" y="260" text-anchor="end" fill="#888899" font-size="11">Subtotal</text>
  <text id="item2-subtotal-val" x="360" y="274" text-anchor="end" fill="#1a1a4e" font-size="12" font-weight="700">Rp 85.000</text>

