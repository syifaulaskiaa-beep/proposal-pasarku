  <text id="item1-minus" x="265" y="230" text-anchor="middle" fill="#4a3fd4" font-size="18" font-weight="700">−</text>
  <rect id="item1-qty-bg" x="282" y="210" width="34" height="30" rx="6" fill="#f5f4ff"/>
  <text id="item1-qty" x="299" y="230" text-anchor="middle" fill="#1a1a4e" font-size="14" font-weight="700">2</text>
  <rect id="item1-plus-bg" x="318" y="210" width="30" height="30" rx="8" fill="#4a3fd4"/>
  <text id="item1-plus" x="333" y="230" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">+</text>
  <text id="item1-subtotal" x="360" y="170" text-anchor="end" fill="#888899" font-size="11">Subtotal</text>
  <text id="item1-subtotal-val" x="360" y="184" text-anchor="end" fill="#1a1a4e" font-size="12" font-weight="700">Rp 50.000</text>

  <!-- ═══ CART ITEM 2: Tas Rajut ═══ -->
  <rect id="item2-bg" x="30" y="235" width="360" height="90" fill="#ffffff"/>
  <line id="item2-divider" x1="30" y1="235" x2="390" y2="235" stroke="#f0f0f8" stroke-width="1.5"/>
  <rect id="item2-check" x="50" y="268" width="16" height="16" rx="4" fill="#4a3fd4"/>
  <path id="item2-tick" d="M53 276 l4 4 l7-8" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
