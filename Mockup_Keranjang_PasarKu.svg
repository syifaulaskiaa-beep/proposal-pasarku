  <text id="appbar-badge-text" x="234" y="85" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">3</text>
  <!-- trash icon -->
  <circle id="trash-bg" cx="358" cy="81" r="16" fill="#fff0f0"/>
  <rect id="trash-body" x="350" y="76" width="16" height="14" rx="2" fill="none" stroke="#e53935" stroke-width="1.8"/>
  <line id="trash-line1" x1="354" y1="80" x2="354" y2="86" stroke="#e53935" stroke-width="1.5"/>
  <line id="trash-line2" x1="358" y1="80" x2="358" y2="86" stroke="#e53935" stroke-width="1.5"/>
  <line id="trash-line3" x1="362" y1="80" x2="362" y2="86" stroke="#e53935" stroke-width="1.5"/>
  <line id="trash-lid" x1="348" y1="76" x2="370" y2="76" stroke="#e53935" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ═══ SELECT ALL ═══ -->
