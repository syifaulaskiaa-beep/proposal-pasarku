  <text id="summary-title" x="50" y="508" fill="#1a1a4e" font-size="14" font-weight="700">Ringkasan Belanja</text>

  <!-- Subtotal row -->
  <text id="row1-label" x="50" y="532" fill="#555577" font-size="13">Subtotal (3 produk)</text>
  <text id="row1-val" x="370" y="532" text-anchor="end" fill="#1a1a4e" font-size="13" font-weight="600">Rp 260.000</text>

  <!-- Ongkir row -->
  <text id="row2-label" x="50" y="554" fill="#555577" font-size="13">Ongkos Kirim</text>
  <rect id="row2-free-badge" x="290" y="542" width="80" height="20" rx="10" fill="#e8f5e9"/>
  <text id="row2-val" x="330" y="556" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="700">GRATIS</text>

  <!-- Diskon row -->
  <text id="row3-label" x="50" y="576" fill="#555577" font-size="13">Diskon Promo</text>
  <text id="row3-val" x="370" y="576" text-anchor="end" fill="#e53935" font-size="13" font-weight="600">−Rp 10.000</text>

  <!-- Divider -->
  <line id="total-divider" x1="50" y1="590" x2="370" y2="590" stroke="#e8e6ff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Total -->
  <text id="total-label" x="50" y="618" fill="#1a1a4e" font-size="16" font-weight="800">Total Pembayaran</text>
  <text id="total-val" x="370" y="618" text-anchor="end" fill="#4a3fd4" font-size="18" font-weight="800">Rp 250.000</text>
  <text id="total-saving" x="50" y="636" fill="#2e7d32" font-size="11">Hemat Rp 10.000 dari promo!</text>

  <!-- ═══ CHECKOUT BUTTON ═══ -->
  <line id="btn-divider" x1="30" y1="648" x2="390" y2="648" stroke="#f0f0f8" stroke-width="4"/>
  <rect id="checkout-btn" x="50" y="658" width="320" height="54" rx="16" fill="url(#btnGrad)"/>
  <!-- arrow -->
  <text id="checkout-btn-text" x="193" y="691" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="800">Lanjut Checkout</text>
  <path id="checkout-arrow" d="M318 685 l10 0 M322 680 l6 5 l-6 5" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ═══ SAFE SHOPPING INFO ═══ -->
  <text id="safe-text" x="210" y="728" text-anchor="middle" fill="#888899" font-size="11">🔒 Transaksi aman &amp; terenkripsi</text>

  <!-- ═══ BOTTOM NAVIGATION ═══ -->
  <rect id="navbar-bg" x="30" y="742" width="360" height="58" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect id="navbar-bottom" x="30" y="788" width="360" height="24" rx="38" fill="#ffffff"/>
  <!-- Home -->
  <polygon id="nav-home-roof" points="80,752 68,762 92,762" fill="#aaaacc"/>
  <rect id="nav-home-wall" x="71" y="762" width="18" height="13" rx="2" fill="#aaaacc"/>
  <rect id="nav-home-door" x="77" y="767" width="6" height="8" rx="1" fill="#f5f4ff"/>
  <text id="nav-home-label" x="80" y="790" text-anchor="middle" fill="#aaaacc" font-size="10">Beranda</text>
  <!-- Search -->
  <circle id="nav-search" cx="170" cy="763" r="8" fill="none" stroke="#aaa" stroke-width="2"/>
  <line id="nav-search-h" x1="176" y1="769" x2="181" y2="774" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>
  <text id="nav-search-label" x="170" y="790" text-anchor="middle" fill="#aaa" font-size="10">Cari</text>
  <!-- Cart (active) -->
  <rect id="nav-cart-active-bg" x="242" y="748" width="36" height="30" rx="15" fill="#eeecff"/>
  <rect id="nav-cart-body" x="249" y="754" width="22" height="17" rx="3" fill="none" stroke="#4a3fd4" stroke-width="2"/>
  <path id="nav-cart-handle" d="M253 754 q0-7 7-7 q7 0 7 7" fill="none" stroke="#4a3fd4" stroke-width="2"/>
  <circle id="nav-cart-w1" cx="253" cy="773" r="2.5" fill="#4a3fd4"/>
  <circle id="nav-cart-w2" cx="267" cy="773" r="2.5" fill="#4a3fd4"/>
  <circle id="nav-cart-badge" cx="271" cy="752" r="8" fill="#e53935"/>
  <text id="nav-cart-badge-t" x="271" y="756" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">3</text>
  <text id="nav-cart-label" x="260" y="790" text-anchor="middle" fill="#4a3fd4" font-size="10" font-weight="700">Keranjang</text>
  <!-- Profile -->
  <circle id="nav-profile-h" cx="350" cy="758" r="8" fill="none" stroke="#aaa" stroke-width="2"/>
  <path id="nav-profile-b" d="M337 775 q4-8 13-8 q9 0 13 8" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>
  <text id="nav-profile-label" x="350" y="790" text-anchor="middle" fill="#aaa" font-size="10">Profil</text>

  <!-- Home indicator -->
  <rect id="home-indicator" x="168" y="822" width="84" height="4" rx="2" fill="#9090cc" opacity="0.4"/>

  <!-- Phone frame overlay -->
  <rect id="phone-frame-overlay" x="30" y="12" width="360" height="800" rx="40" fill="none" stroke="#b8b4e8" stroke-width="2.5"/>
</svg>
