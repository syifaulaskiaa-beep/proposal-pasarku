  <rect id="phone-notch" x="162" y="15" width="96" height="22" rx="11" fill="#1e1a7a"/>
  <circle id="camera" cx="210" cy="26" r="5" fill="#12106a"/>

  <!-- ═══ STATUS BAR ═══ -->
  <rect id="statusbar-bg" x="30" y="12" width="360" height="44" rx="38" fill="#ffffff"/>
  <rect id="statusbar-fix" x="30" y="38" width="360" height="18" fill="#ffffff"/>
  <text id="status-time" x="60" y="38" fill="#1a1a4e" font-size="12" font-weight="700">9:41</text>
  <rect id="bat-outline" x="346" y="28" width="22" height="11" rx="2" fill="none" stroke="#1a1a4e" stroke-width="1.5"/>
  <rect id="bat-tip" x="368" y="31" width="3" height="5" rx="1" fill="#1a1a4e"/>
  <rect id="bat-fill" x="348" y="30" width="16" height="7" rx="1" fill="#4a3fd4"/>
  <rect id="sig1" x="316" y="33" width="3" height="6" rx="1" fill="#1a1a4e"/>
  <rect id="sig2" x="321" y="30" width="3" height="9" rx="1" fill="#1a1a4e"/>
  <rect id="sig3" x="326" y="27" width="3" height="12" rx="1" fill="#1a1a4e"/>

